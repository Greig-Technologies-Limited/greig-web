name: CI/CD — Greig Technologies Web

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────
  # JOB 1 — Secret Detection
  # ────────────────────────────────────────────────────
  secret-scan:
    name: "🔐 Secret Detection (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────
  # JOB 2 — SAST
  # ────────────────────────────────────────────────────
  sast:
    name: "🔍 SAST (Semgrep)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/react
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  # ────────────────────────────────────────────────────
  # JOB 3 — Dependency Audit
  # ────────────────────────────────────────────────────
  dependency-audit:
    name: "📦 Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # ────────────────────────────────────────────────────
  # JOB 4 — Lint, Type-check & Build
  # ────────────────────────────────────────────────────
  build:
    name: "🔨 Lint, Typecheck & Build"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (static export)
        run: npm run build
        env:
          NODE_ENV: production

      # Cache the `out/` directory for the deploy job
      - name: Upload static export artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-export
          path: out/
          retention-days: 1

  # ────────────────────────────────────────────────────
  # JOB 5 — Deploy to Cloudflare Pages
  #          Runs only on push to main after build passes
  # ────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy → Cloudflare Pages"
    runs-on: ubuntu-latest
    needs: [build, dependency-audit, sast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://www.greigtechnologies.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download static export
        uses: actions/download-artifact@v4
        with:
          name: static-export
          path: out/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: greig-web          # must match your CF Pages project name
          directory: out                  # static export output directory
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "3"

      - name: Deployment summary
        run: |
          echo "### ✅ Deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://www.greigtechnologies.com" >> $GITHUB_STEP_SUMMARY
