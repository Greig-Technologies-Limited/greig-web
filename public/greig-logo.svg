<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140">
  <defs>
    <radialGradient id="globeGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#8fdd8f"/>
      <stop offset="35%" stop-color="#5cb85c"/>
      <stop offset="70%" stop-color="#3a9e3f"/>
      <stop offset="100%" stop-color="#1e6b22"/>
    </radialGradient>
    <radialGradient id="sheen" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="70" cy="70" r="60"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="70" cy="134" rx="52" ry="7" fill="rgba(0,0,0,0.12)"/>

  <!-- Globe base -->
  <circle cx="70" cy="70" r="62" fill="url(#shadowGrad)"/>
  <circle cx="70" cy="70" r="60" fill="url(#globeGrad)"/>

  <!-- Network lines clipped inside globe -->
  <g clip-path="url(#globeClip)" stroke="#1a5c1e" stroke-width="1.8" stroke-opacity="0.55" fill="none">
    <!-- From centre -->
    <line x1="70" y1="70" x2="42" y2="40"/>
    <line x1="70" y1="70" x2="100" y2="38"/>
    <line x1="70" y1="70" x2="28" y2="76"/>
    <line x1="70" y1="70" x2="110" y2="80"/>
    <line x1="70" y1="70" x2="66" y2="108"/>
    <line x1="70" y1="70" x2="94" y2="100"/>
    <!-- Cross connections -->
    <line x1="42" y1="40" x2="100" y2="38"/>
    <line x1="42" y1="40" x2="28" y2="76"/>
    <line x1="100" y1="38" x2="110" y2="80"/>
    <line x1="28" y1="76" x2="66" y2="108"/>
    <line x1="110" y1="80" x2="94" y2="100"/>
    <line x1="66" y1="108" x2="94" y2="100"/>
  </g>

  <!-- Network nodes -->
  <!-- Centre -->
  <circle cx="70" cy="70" r="6.5" fill="#0f3d12" stroke="#2d7d31" stroke-width="1.5"/>
  <circle cx="70" cy="70" r="3.5" fill="#7dd87f"/>

  <!-- Outer nodes -->
  <circle cx="42" cy="40" r="6" fill="#0f3d12" stroke="#2d7d31" stroke-width="1.3"/>
  <circle cx="42" cy="40" r="3" fill="#5cb85c"/>

  <circle cx="100" cy="38" r="6" fill="#0f3d12" stroke="#2d7d31" stroke-width="1.3"/>
  <circle cx="100" cy="38" r="3" fill="#5cb85c"/>

  <circle cx="28" cy="76" r="6" fill="#0f3d12" stroke="#2d7d31" stroke-width="1.3"/>
  <circle cx="28" cy="76" r="3" fill="#5cb85c"/>

  <circle cx="110" cy="80" r="6" fill="#0f3d12" stroke="#2d7d31" stroke-width="1.3"/>
  <circle cx="110" cy="80" r="3" fill="#5cb85c"/>

  <circle cx="66" cy="108" r="6" fill="#0f3d12" stroke="#2d7d31" stroke-width="1.3"/>
  <circle cx="66" cy="108" r="3" fill="#5cb85c"/>

  <circle cx="94" cy="100" r="6" fill="#0f3d12" stroke="#2d7d31" stroke-width="1.3"/>
  <circle cx="94" cy="100" r="3" fill="#5cb85c"/>

  <!-- Sheen overlay -->
  <circle cx="70" cy="70" r="60" fill="url(#sheen)"/>

  <!-- Globe border -->
  <circle cx="70" cy="70" r="60" fill="none" stroke="#2d7d31" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- GREIG — bold dark grey -->
  <text x="152" y="68"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="46"
    letter-spacing="2"
    fill="#4a4a4a">GREIG</text>

  <!-- TECHNOLOGIES — green, medium weight -->
  <text x="154" y="98"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="600"
    font-size="18.5"
    letter-spacing="3.5"
    fill="#3a9e3f">TECHNOLOGIES</text>

  <!-- LIMITED — grey, wide spaced caps -->
  <text x="157" y="118"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="13"
    letter-spacing="8"
    fill="#7a7a7a">LIMITED</text>
</svg>
